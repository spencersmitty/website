<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPMincho&display=swap" rel="stylesheet">

    <title>smitty</title>

    <!-- set SVG as favicon for all sizes -->
    <link rel="icon" href="media/icons/favicon.svg" type="image/svg+xml">

    <style>
      /* default favicon behavior */
      link[rel="icon"] {
        color: #000000; /* black for light mode */
      }

      /* invert favicon color for dark mode */
      @media (prefers-color-scheme: dark) {
        link[rel="icon"] {
          filter: invert(1) brightness(100);
        }
      }

      /* font for header */
      h1 {
        font-family: 'BIZ UDPMincho', serif; /* fallback to serif */
      }
    </style>
    
  </head>

  <body>

    <h1>smitty</h1>
    
    <!-- caution tape divider -->
    <div class="caution-tape"></div>
    
    <p>under construction<br />この愚かな猿を見よ</p>

    <!-- monke -->
    <img id="monke" src="media/monke.gif" alt="monke" />

    <script src="script.js"></script>
  </body>
</html>
