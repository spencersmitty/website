<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPMincho&display=swap" rel="stylesheet" />
    <title>smitty</title>
    <link rel="icon" href="media/icons/favicon.ico" type="image/x-icon" />
    <style>
      h1 {
        font-family: "BIZ UDPMincho", serif;
      }
    </style>
  </head>
  <body>
    <section class="intro">
      <h1>smitty</h1>

      <div class="caution-tape"></div>

      <p>under construction<br />準備中</p>

      <!-- The TV frame with a click event -->
      <div id="tv" class="tv-frame" style="cursor: pointer;">
        <img src="media/tv.png" class="frame" alt="tv frame" />
        <img src="media/video.gif" class="screen" alt="tv content" />
      </div>

      <p class="wave-text">click/tap tv to leave a message &lt;3   </p>
    </section>

    <!-- JavaScript to handle the chat popup -->
    <script>
      document.getElementById("tv").addEventListener("click", () => {
        const chatWindow = window.open("https://www3.cbox.ws/box/?boxid=3546133&boxtag=UkIQjc", 
                                      "chat", 
                                      "width=400,height=600,scrollbars=yes,resizable=yes");
        if (!chatWindow) {
          alert("Please allow pop-ups for this site.");
        }
      });
    </script>

    <script src="script.js"></script>
  </body>
</html>
