<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="not found" />
    <title>not found</title>
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body>
    <div class="nf-layout">
      <header class="gallery-header">
      </header>
      <main class="gallery-container">
        <section id="gallery-grid" class="gallery-grid" aria-label="gallery grid"></section>
        <section id="gallery-detail" style="display:none" aria-label="artwork detail">
          <div class="artwork-wrapper">
            <img id="detail-image" class="artwork-media" src="" alt="" />
            <p id="detail-label" class="art-label"></p>
          </div>
        </section>
        <section id="not-found" style="display:none">
          <p>404 — not found</p>
          <p><a href="/">go home</a></p>
        </section>
      </main>
    </div>
    <script>
      (function(){
        document.getElementById('gallery-grid').style.display = 'none';
        document.getElementById('gallery-detail').style.display = 'none';
        document.getElementById('not-found').style.display = '';
      })();
    </script>
    <script src="/assets/js/script.js"></script>
  </body>
</html>
